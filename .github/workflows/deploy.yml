name: Deploy to VPS

on:
push:
branches:
- main

jobs:
deploy:
runs-on: ubuntu-latest


steps:
  - name: Checkout code
    uses: actions/checkout@v4

  - name: Login to GHCR
    run: echo "${{ secrets.GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

  - name: Build Docker image
    run: docker build -t ghcr.io/${{ github.repository }}/imlab-host:latest .

  - name: Push Docker image
    run: docker push ghcr.io/${{ github.repository }}/imlab-host:latest

  - name: Deploy to VPS
    uses: appleboy/ssh-action@v1.0.3
    with:
      host: ${{ secrets.VPS_HOST }}
      username: root
      key: ${{ secrets.VPS_SSH_KEY }}
      script: |
        docker pull ghcr.io/${{ github.repository }}/imlab-host:latest
        docker stop imlab || true
        docker rm imlab || true
        docker run -d \
          --name imlab \
          --restart unless-stopped \
          -p 3000:3000 \
          --env-file .env \
          ghcr.io/${{ github.repository }}/imlab-host:latest

